<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Chore Tracker</title>
<link rel="icon" type="image/png" href="icon.png" />
<link rel="apple-touch-icon" href="icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Chores" />
<meta name="theme-color" content="#4f46e5" />
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
  :root {
    --bg: #f6f7fb;
    --card: #ffffff;
    --text: #1a1a2e;
    --muted: #6b7280;
    --primary: #4f46e5;
    --primary-hover: #4338ca;
    --success: #10b981;
    --warn: #f59e0b;
    --danger: #ef4444;
    --border: #e5e7eb;
    --imessage: #007aff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }
  header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
  }
  header h1 { margin: 0; font-size: 1.2rem; }
  .user-info { display: flex; gap: 10px; align-items: center; font-size: 0.9rem; flex-wrap: wrap; }
  .role-badge {
    padding: 2px 8px;
    border-radius: 12px;
    background: var(--primary);
    color: white;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .role-badge.kid { background: var(--success); }
  .balance {
    background: #ecfdf5;
    color: #047857;
    padding: 4px 10px;
    border-radius: 6px;
    font-weight: 600;
  }
  main {
    max-width: 760px;
    margin: 20px auto;
    padding: 0 16px;
    display: grid;
    gap: 20px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
  }
  .card h2 { margin: 0 0 12px; font-size: 1.05rem; }

  form { display: grid; gap: 10px; }
  label { display: grid; gap: 4px; font-size: 0.88rem; color: var(--muted); }
  input, textarea, select {
    font: inherit;
    padding: 9px 11px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: white;
    color: var(--text);
  }
  input:focus, textarea:focus, select:focus { outline: 2px solid var(--primary); outline-offset: -1px; }

  button, .btn-link {
    font: inherit;
    cursor: pointer;
    border: none;
    background: var(--primary);
    color: white;
    padding: 9px 14px;
    border-radius: 8px;
    font-weight: 500;
    text-decoration: none;
    display: inline-block;
  }
  button:hover, .btn-link:hover { background: var(--primary-hover); }
  button.secondary { background: #e5e7eb; color: var(--text); }
  button.secondary:hover { background: #d1d5db; }
  button.success { background: var(--success); }
  button.success:hover { background: #059669; }
  button.warn { background: var(--warn); }
  button.warn:hover { background: #d97706; }
  button.danger { background: var(--danger); }
  button.danger:hover { background: #dc2626; }
  button.tiny, .btn-link.tiny { padding: 5px 10px; font-size: 0.85rem; }
  .btn-link.imessage { background: var(--imessage); }
  .btn-link.imessage:hover { background: #0062cc; }

  .chore-list { display: grid; gap: 12px; }
  .chore {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    display: grid;
    gap: 10px;
  }
  .chore-head { display: flex; justify-content: space-between; gap: 12px; align-items: start; }
  .chore-title { margin: 0; font-size: 1rem; }
  .chore-desc { color: var(--muted); font-size: 0.9rem; margin: 0; }
  .reward { font-weight: 700; color: var(--success); }
  .status {
    display: inline-block;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 2px 8px;
    border-radius: 10px;
  }
  .status.open { background: #dbeafe; color: #1e40af; }
  .status.claimed { background: #fef3c7; color: #92400e; }
  .status.completed { background: #fce7f3; color: #9d174d; }
  .status.approved { background: #d1fae5; color: #065f46; }
  .chore-meta { font-size: 0.8rem; color: var(--muted); }
  .chore-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .empty { color: var(--muted); font-style: italic; }

  .profile-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 10px;
    margin-bottom: 12px;
  }
  .profile-tile {
    text-align: center;
    padding: 16px 10px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: white;
    cursor: pointer;
  }
  .profile-tile:hover { border-color: var(--primary); background: #f5f3ff; }
  .profile-tile .name { font-weight: 600; margin-bottom: 4px; }
  .profile-tile .role-badge { margin-top: 4px; }
  .profile-tile .bal { font-size: 0.8rem; color: var(--success); margin-top: 6px; font-weight: 600; }

  .sync-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #d1d5db;
    margin-right: 6px;
  }
  .sync-dot.connected { background: var(--success); }
  .sync-dot.error { background: var(--danger); }

  .menu-btn {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
    padding: 6px 10px;
    font-size: 1.1rem;
    line-height: 1;
    border-radius: 8px;
  }
  .menu-btn:hover { background: #f3f4f6; }
  .menu-backdrop {
    position: fixed;
    inset: 0;
    background: transparent;
    z-index: 9;
  }
  .menu-popover {
    position: fixed;
    top: 60px;
    right: 14px;
    background: white;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.12);
    z-index: 10;
    min-width: 260px;
    max-width: calc(100vw - 28px);
    display: grid;
    gap: 10px;
  }
  .menu-popover .label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .menu-popover code {
    background: #f3f4f6;
    padding: 4px 10px;
    border-radius: 6px;
    font-weight: 600;
    letter-spacing: 1px;
    display: inline-block;
  }
  .menu-popover .row { display: flex; gap: 8px; flex-wrap: wrap; }

  .members-list { display: grid; gap: 6px; }
  .member-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 10px;
    border-radius: 6px;
    background: #f9fafb;
    gap: 10px;
    flex-wrap: wrap;
  }
  .member-row .contact { font-size: 0.8rem; color: var(--muted); }

  details { margin-top: 8px; }
  details summary { cursor: pointer; color: var(--primary); font-size: 0.9rem; }

  @media (max-width: 540px) {
    .chore-head { flex-direction: column; }
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
(() => {
  const FIREBASE_CONFIG = {
    apiKey: "AIzaSyBQu5AjAh25pn4EHugA-VWn0wYCdZLjPD8",
    authDomain: "chores-app-9d3cb.firebaseapp.com",
    databaseURL: "https://chores-app-9d3cb-default-rtdb.firebaseio.com",
    projectId: "chores-app-9d3cb",
    storageBucket: "chores-app-9d3cb.firebasestorage.app",
    messagingSenderId: "837618800965",
    appId: "1:837618800965:web:46bb2027095fc70023862c",
  };

  const STORAGE_KEY = 'choresApp.v1';
  const FAMILY_KEY = 'choresApp.familyCode';
  const root = document.getElementById('app');

  function loadLocal() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const s = JSON.parse(raw);
        if (!s.recurring) s.recurring = [];
        return s;
      }
    } catch {}
    return { profiles: [], chores: [], recurring: [], activeProfileId: null };
  }

  function saveLocal() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  // Push local profiles+chores+recurring to Firebase. activeProfileId stays per-device.
  function pushRemote() {
    if (!firebaseReady || !dataRef || suppressWrite) return;
    dataRef.set({
      profiles: state.profiles,
      chores: state.chores,
      recurring: state.recurring || [],
      updated_at: Date.now(),
    }).catch(err => console.warn('Firebase write failed', err));
  }

  function saveState() {
    saveLocal();
    pushRemote();
  }

  const state = loadLocal();
  let familyCode = localStorage.getItem(FAMILY_KEY);
  let firebaseReady = false;
  let dataRef = null;
  let suppressWrite = false;
  let syncStatus = 'offline'; // offline | connecting | connected | error
  let menuOpen = false;

  function setFamilyCode(code) {
    familyCode = code ? code.trim().toUpperCase() : null;
    if (familyCode) localStorage.setItem(FAMILY_KEY, familyCode);
    else localStorage.removeItem(FAMILY_KEY);
  }

  function generateFamilyCode() {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    let out = '';
    for (let i = 0; i < 6; i++) out += chars[Math.floor(Math.random() * chars.length)];
    return out;
  }

  function initFirebase() {
    if (typeof firebase === 'undefined' || FIREBASE_CONFIG.apiKey === 'YOUR_API_KEY') {
      syncStatus = 'offline';
      return;
    }
    try {
      firebase.initializeApp(FIREBASE_CONFIG);
      firebaseReady = true;
      // Check URL hash for invite link
      const hash = (location.hash || '').match(/family=([A-Z0-9]+)/i);
      if (hash && !familyCode) setFamilyCode(hash[1]);
      if (familyCode) connectFamily(familyCode);
    } catch (e) {
      console.warn('Firebase init failed', e);
      syncStatus = 'error';
    }
  }

  function connectFamily(code) {
    if (!firebaseReady) return;
    setFamilyCode(code);
    if (dataRef) dataRef.off();
    syncStatus = 'connecting';
    render();
    dataRef = firebase.database().ref(`families/${familyCode}`);
    dataRef.on('value', (snap) => {
      const remote = snap.val();
      syncStatus = 'connected';
      if (!remote) {
        // Empty family node — push current local state up so we own it
        pushRemote();
        render();
        return;
      }
      suppressWrite = true;
      state.profiles = remote.profiles || [];
      state.chores = remote.chores || [];
      state.recurring = remote.recurring || [];
      // If our active profile no longer exists in synced set, clear it
      if (state.activeProfileId && !state.profiles.find(p => p.id === state.activeProfileId)) {
        state.activeProfileId = null;
      }
      saveLocal();
      suppressWrite = false;
      render();
    }, (err) => {
      console.warn('Firebase read failed', err);
      syncStatus = 'error';
      render();
    });
  }

  function leaveFamily() {
    if (!confirm('Leave this family on this device? You can rejoin with the code later.')) return;
    if (dataRef) { dataRef.off(); dataRef = null; }
    setFamilyCode(null);
    state.profiles = [];
    state.chores = [];
    state.activeProfileId = null;
    saveLocal();
    syncStatus = firebaseReady ? 'offline' : 'offline';
    render();
  }

  function uid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
  }

  function fmtMoney(cents) {
    return `$${(cents / 100).toFixed(2)}`;
  }

  function activeProfile() {
    return state.profiles.find(p => p.id === state.activeProfileId) || null;
  }

  function profileById(id) {
    return state.profiles.find(p => p.id === id);
  }

  function paymentSmsUrl(contact, cents, choreTitle) {
    const isEmail = contact.includes('@');
    const cleaned = isEmail ? contact.trim() : contact.replace(/[^\d+]/g, '');
    const body = `Sending you ${fmtMoney(cents)} for "${choreTitle}" via Apple Cash 💸 (tap the apps icon in this message, then Apple Cash)`;
    return `sms:${encodeURIComponent(cleaned)}?&body=${encodeURIComponent(body)}`;
  }

  function el(tag, attrs = {}, ...children) {
    const node = document.createElement(tag);
    for (const [k, v] of Object.entries(attrs)) {
      if (k === 'class') node.className = v;
      else if (k.startsWith('on') && typeof v === 'function') node.addEventListener(k.slice(2).toLowerCase(), v);
      else if (v === true) node.setAttribute(k, '');
      else if (v !== false && v != null) node.setAttribute(k, v);
    }
    for (const child of children.flat()) {
      if (child == null || child === false) continue;
      node.appendChild(typeof child === 'string' ? document.createTextNode(child) : child);
    }
    return node;
  }

  // --- Actions ---

  function addProfile({ name, role, contact }) {
    state.profiles.push({
      id: uid(),
      name: name.trim(),
      role,
      contact: contact ? contact.trim() : '',
      balance_cents: 0,
    });
    saveState();
  }

  function removeProfile(id) {
    state.profiles = state.profiles.filter(p => p.id !== id);
    // Free up any chores claimed by this profile
    for (const c of state.chores) {
      if (c.claimed_by === id && c.status !== 'approved') {
        c.claimed_by = null;
        c.claimed_at = null;
        c.completed_at = null;
        c.status = 'open';
      }
    }
    if (state.activeProfileId === id) state.activeProfileId = null;
    saveState();
  }

  function updateContact(id, contact) {
    const p = profileById(id);
    if (!p) return;
    p.contact = contact.trim();
    saveState();
  }

  function updateProfile(id, { name, contact, role, pin }) {
    const p = profileById(id);
    if (!p) return;
    if (name && name.trim()) p.name = name.trim();
    if (typeof contact === 'string') p.contact = contact.trim();
    if (role && (role === 'parent' || role === 'kid')) p.role = role;
    if (typeof pin === 'string') p.pin = pin.trim() || null;
    saveState();
  }

  function resetBalance(id) {
    const p = profileById(id);
    if (!p) return;
    p.balance_cents = 0;
    saveState();
  }

  function addChore({ title, description, rewardCents }) {
    state.chores.push({
      id: uid(),
      title: title.trim(),
      description: (description || '').trim() || null,
      reward_cents: Math.max(0, Math.floor(rewardCents)),
      status: 'open',
      created_by: state.activeProfileId,
      claimed_by: null,
      claimed_at: null,
      completed_at: null,
      approved_at: null,
      created_at: new Date().toISOString(),
    });
    saveState();
  }

  function deleteChore(id) {
    state.chores = state.chores.filter(c => c.id !== id);
    saveState();
  }

  function claimChore(id) {
    const c = state.chores.find(x => x.id === id);
    if (!c || c.status !== 'open') return;
    c.status = 'claimed';
    c.claimed_by = state.activeProfileId;
    c.claimed_at = new Date().toISOString();
    saveState();
  }

  function unclaimChore(id) {
    const c = state.chores.find(x => x.id === id);
    if (!c || c.status !== 'claimed' || c.claimed_by !== state.activeProfileId) return;
    c.status = 'open';
    c.claimed_by = null;
    c.claimed_at = null;
    saveState();
  }

  function completeChore(id) {
    const c = state.chores.find(x => x.id === id);
    if (!c || c.status !== 'claimed' || c.claimed_by !== state.activeProfileId) return;
    c.status = 'completed';
    c.completed_at = new Date().toISOString();
    saveState();
  }

  function approveChore(id) {
    const c = state.chores.find(x => x.id === id);
    if (!c || c.status !== 'completed') return;
    c.status = 'approved';
    c.approved_at = new Date().toISOString();
    const kid = profileById(c.claimed_by);
    if (kid) kid.balance_cents += c.reward_cents;
    saveState();
  }

  function rejectChore(id) {
    const c = state.chores.find(x => x.id === id);
    if (!c || c.status !== 'completed') return;
    c.status = 'claimed';
    c.completed_at = null;
    saveState();
  }

  function addRecurring({ title, description, rewardCents, frequency, startDate, time }) {
    const next = computeFirstDueAt({ frequency, startDate, time });
    state.recurring.push({
      id: uid(),
      title: title.trim(),
      description: (description || '').trim() || null,
      reward_cents: Math.max(0, Math.floor(rewardCents)),
      frequency,
      start_date: startDate,
      time_of_day: time,
      next_due_at: next.toISOString(),
      paused: false,
      created_by: state.activeProfileId,
    });
    saveState();
    maybeSpawnRecurring();
  }

  function deleteRecurring(id) {
    state.recurring = state.recurring.filter(t => t.id !== id);
    saveState();
  }

  function toggleRecurringPaused(id) {
    const t = state.recurring.find(x => x.id === id);
    if (!t) return;
    t.paused = !t.paused;
    saveState();
  }

  function computeFirstDueAt({ frequency, startDate, time }) {
    const [h, m] = (time || '09:00').split(':').map(Number);
    const d = new Date(startDate + 'T00:00:00');
    d.setHours(h || 0, m || 0, 0, 0);
    return d;
  }

  function bumpNextDueAt(tmpl) {
    const cur = new Date(tmpl.next_due_at);
    if (tmpl.frequency === 'daily') cur.setDate(cur.getDate() + 1);
    else if (tmpl.frequency === 'weekly') cur.setDate(cur.getDate() + 7);
    else if (tmpl.frequency === 'monthly') cur.setMonth(cur.getMonth() + 1);
    return cur.toISOString();
  }

  function maybeSpawnRecurring() {
    if (!state.recurring || state.recurring.length === 0) return false;
    const now = Date.now();
    let changed = false;
    for (const tmpl of state.recurring) {
      if (tmpl.paused) continue;
      // Catch up if overdue, but only spawn one open instance at a time
      while (new Date(tmpl.next_due_at).getTime() <= now) {
        const hasOpen = state.chores.some(c => c.template_id === tmpl.id && c.status !== 'approved');
        if (!hasOpen) {
          state.chores.push({
            id: uid(),
            title: tmpl.title,
            description: tmpl.description,
            reward_cents: tmpl.reward_cents,
            status: 'open',
            created_by: tmpl.created_by,
            template_id: tmpl.id,
            claimed_by: null,
            claimed_at: null,
            completed_at: null,
            approved_at: null,
            created_at: new Date().toISOString(),
          });
        }
        tmpl.next_due_at = bumpNextDueAt(tmpl);
        changed = true;
      }
    }
    if (changed) saveState();
    return changed;
  }

  function markChorePaid(id) {
    const c = state.chores.find(x => x.id === id);
    if (!c || c.status !== 'approved') return;
    const kid = profileById(c.claimed_by);
    if (kid) kid.balance_cents = Math.max(0, kid.balance_cents - c.reward_cents);
    c.status = 'paid';
    c.paid_at = new Date().toISOString();
    saveState();
  }

  function earningsFor(kidId) {
    const paid = state.chores.filter(c => c.status === 'paid' && c.claimed_by === kidId);
    const now = Date.now();
    const weekAgo = now - 7 * 24 * 60 * 60 * 1000;
    const monthAgo = now - 30 * 24 * 60 * 60 * 1000;
    let week = 0, month = 0, total = 0;
    for (const c of paid) {
      const t = new Date(c.paid_at).getTime();
      total += c.reward_cents;
      if (t >= weekAgo) week += c.reward_cents;
      if (t >= monthAgo) month += c.reward_cents;
    }
    return { week, month, total, count: paid.length, recent: paid.slice(-5).reverse() };
  }

  function switchProfile(id) {
    if (id) {
      const p = profileById(id);
      if (p && p.pin) {
        const entry = prompt(`Enter PIN for ${p.name}:`);
        if (entry === null) return;
        if (entry !== p.pin) { alert('Incorrect PIN.'); return; }
      }
    }
    state.activeProfileId = id;
    saveState();
    render();
  }

  function resetApp() {
    if (!confirm('Erase all profiles and chores on this device?')) return;
    localStorage.removeItem(STORAGE_KEY);
    state.profiles = [];
    state.chores = [];
    state.activeProfileId = null;
    render();
  }

  // --- Views ---

  function familySetupView() {
    const card = el('div', { class: 'card' });
    card.appendChild(el('h2', {}, 'Set up your family'));
    card.appendChild(el('p', { class: 'chore-meta' },
      firebaseReady
        ? 'Create a new family or join one with a code from a parent.'
        : 'Firebase config missing — paste your config into index.html to enable cross-device sync.'
    ));

    if (!firebaseReady) {
      return el('div', {}, el('header', {}, el('h1', {}, 'Chore Tracker')), el('main', {}, card));
    }

    card.appendChild(el('button', {
      style: 'margin-top: 8px;',
      onClick: () => {
        const code = generateFamilyCode();
        connectFamily(code);
      }
    }, 'Create new family'));

    card.appendChild(el('form', {
      style: 'margin-top: 14px;',
      onSubmit: (e) => {
        e.preventDefault();
        const code = (new FormData(e.target).get('code') || '').toString().trim().toUpperCase();
        if (!code) return;
        connectFamily(code);
      }
    },
      el('label', {}, 'Or join with a code',
        el('input', { name: 'code', placeholder: 'e.g. AB12CD', required: true, style: 'text-transform: uppercase;' }),
      ),
      el('button', { type: 'submit', class: 'secondary' }, 'Join family'),
    ));

    return el('div', {}, el('header', {}, el('h1', {}, 'Chore Tracker')), el('main', {}, card));
  }

  function menuButton() {
    if (!familyCode) return null;
    return el('button', {
      class: 'menu-btn',
      title: 'Family menu',
      onClick: () => { menuOpen = !menuOpen; render(); },
    }, '☰');
  }

  function menuPopover() {
    if (!menuOpen || !familyCode) return null;
    const inviteUrl = `${location.origin}${location.pathname}#family=${familyCode}`;
    const statusText = syncStatus === 'connected' ? 'Synced live' :
                       syncStatus === 'connecting' ? 'Connecting…' :
                       syncStatus === 'error' ? 'Connection error' : 'Offline';
    return el('div', {},
      el('div', { class: 'menu-backdrop', onClick: () => { menuOpen = false; render(); } }),
      el('div', { class: 'menu-popover' },
        el('div', {},
          el('div', { class: 'label' }, 'Family code'),
          el('code', {}, familyCode),
        ),
        el('div', {},
          el('span', { class: `sync-dot ${syncStatus === 'connected' ? 'connected' : (syncStatus === 'error' ? 'error' : '')}` }),
          statusText,
        ),
        el('div', { class: 'row' },
          el('button', {
            class: 'secondary tiny',
            onClick: async () => {
              try {
                await navigator.clipboard.writeText(inviteUrl);
                alert('Invite link copied!');
              } catch {
                prompt('Copy this invite link:', inviteUrl);
              }
              menuOpen = false; render();
            }
          }, 'Copy invite link'),
          el('button', {
            class: 'danger tiny',
            onClick: () => { menuOpen = false; leaveFamily(); },
          }, 'Leave family'),
        ),
      ),
    );
  }

  function profilePicker() {
    const wrap = el('main');
    const card = el('div', { class: 'card' });
    card.appendChild(el('h2', {}, 'Who\'s using this?'));

    if (state.profiles.length === 0) {
      card.appendChild(el('p', { class: 'empty' }, 'No profiles yet — add a parent to get started.'));
    } else {
      const grid = el('div', { class: 'profile-grid' });
      for (const p of state.profiles) {
        const stats = p.role === 'kid' ? earningsFor(p.id) : null;
        grid.appendChild(el('div', { class: 'profile-tile', onClick: () => switchProfile(p.id) },
          el('div', { class: 'name' }, p.name),
          el('span', { class: `role-badge ${p.role}` }, p.role),
          p.pin ? el('div', { class: 'contact', style: 'margin-top: 4px;' }, '🔒') : null,
          stats ? el('div', { class: 'bal' }, fmtMoney(stats.total)) : null,
          stats ? el('div', { class: 'chore-meta', style: 'font-size: 0.7rem;' }, 'all time') : null,
        ));
      }
      card.appendChild(grid);
    }

    card.appendChild(addProfileForm());

    if (state.profiles.length > 0) {
      const details = el('details');
      details.appendChild(el('summary', {}, 'Manage profiles'));
      const list = el('div', { class: 'members-list', style: 'margin-top: 8px;' });
      for (const p of state.profiles) {
        list.appendChild(el('div', { class: 'member-row' },
          el('span', {}, `${p.name} `, el('span', { class: `role-badge ${p.role}` }, p.role)),
          el('button', {
            class: 'danger tiny',
            onClick: () => {
              if (confirm(`Remove ${p.name}? Their unfinished chores will go back to the pool.`)) {
                removeProfile(p.id);
                render();
              }
            }
          }, 'Remove'),
        ));
      }
      details.appendChild(list);
      details.appendChild(el('button', {
        class: 'secondary tiny',
        style: 'margin-top: 10px;',
        onClick: resetApp,
      }, 'Erase all data'));
      card.appendChild(details);
    }

    wrap.appendChild(card);
    return el('div', {},
      el('header', {},
        el('h1', {}, 'Chore Tracker'),
        el('div', { class: 'user-info' }, menuButton()),
      ),
      el('main', {}, ...wrap.children),
      menuPopover(),
    );
  }

  function addProfileForm() {
    return el('form', {
      style: 'margin-top: 14px;',
      onSubmit: (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const name = (fd.get('name') || '').toString().trim();
        if (!name) return;
        addProfile({
          name,
          role: fd.get('role'),
          contact: (fd.get('contact') || '').toString(),
        });
        e.target.reset();
        render();
      }
    },
      el('h2', { style: 'margin: 6px 0 4px; font-size: 0.95rem;' }, 'Add a profile'),
      el('label', {}, 'Name', el('input', { name: 'name', required: true, placeholder: 'e.g. Mom or Lily' })),
      el('label', {}, 'Role',
        el('select', { name: 'role' },
          el('option', { value: 'parent' }, 'Parent'),
          el('option', { value: 'kid' }, 'Kid'),
        ),
      ),
      el('label', {}, 'Apple Cash contact (optional — iCloud email or phone, for kids)',
        el('input', { name: 'contact', type: 'text', placeholder: 'kid@icloud.com' }),
      ),
      el('button', { type: 'submit' }, 'Add profile'),
    );
  }

  function appView() {
    const me = activeProfile();
    const isParent = me.role === 'parent';
    return el('div', {},
      el('header', {},
        el('h1', {}, 'Chore Tracker'),
        el('div', { class: 'user-info' },
          el('span', {}, `Hi, ${me.name}`),
          el('span', { class: `role-badge ${me.role}` }, me.role),
          !isParent && el('span', { class: 'balance', title: 'All time earned' }, fmtMoney(earningsFor(me.id).total)),
          el('button', { class: 'secondary tiny', onClick: () => switchProfile(null) }, 'Switch user'),
          menuButton(),
        ),
      ),
      el('main', {},
        isParent ? parentPanel() : kidPanel(me),
        familyPanel(isParent),
        choreListPanel(isParent, me),
      ),
      menuPopover(),
    );
  }

  function parentPanel() {
    return el('div', { class: 'card' },
      el('h2', {}, 'Add a new chore'),
      el('form', {
        onSubmit: (e) => {
          e.preventDefault();
          const fd = new FormData(e.target);
          const dollars = parseFloat(fd.get('reward')) || 0;
          const isRecurring = fd.get('recurring') === 'on';
          if (isRecurring) {
            addRecurring({
              title: (fd.get('title') || '').toString(),
              description: (fd.get('description') || '').toString(),
              rewardCents: Math.round(dollars * 100),
              frequency: fd.get('frequency'),
              startDate: fd.get('startDate'),
              time: fd.get('time'),
            });
          } else {
            addChore({
              title: (fd.get('title') || '').toString(),
              description: (fd.get('description') || '').toString(),
              rewardCents: Math.round(dollars * 100),
            });
          }
          e.target.reset();
          e.target.elements.reward.value = '1.00';
          render();
        }
      },
        el('label', {}, 'Title', el('input', { name: 'title', required: true, placeholder: 'e.g. Take out the trash' })),
        el('label', {}, 'Description (optional)', el('textarea', { name: 'description', rows: 2 })),
        el('label', {}, 'Reward ($)', el('input', { name: 'reward', type: 'number', min: '0', step: '0.25', required: true, value: '1.00' })),
        el('label', { style: 'display: flex; flex-direction: row; align-items: center; gap: 8px;' },
          el('input', {
            type: 'checkbox',
            name: 'recurring',
            style: 'width: auto;',
            onChange: (e) => {
              const f = e.target.closest('form').querySelector('.recurring-fields');
              if (f) f.style.display = e.target.checked ? 'grid' : 'none';
            },
          }),
          'Make this a recurring chore',
        ),
        el('div', { class: 'recurring-fields', style: 'display: none; gap: 10px; padding: 10px; background: #f9fafb; border-radius: 8px; grid-template-columns: 1fr 1fr;' },
          el('label', { style: 'grid-column: 1 / -1;' }, 'Repeats',
            el('select', { name: 'frequency' },
              el('option', { value: 'daily' }, 'Every day'),
              el('option', { value: 'weekly', selected: true }, 'Every week'),
              el('option', { value: 'monthly' }, 'Every month'),
            ),
          ),
          el('label', {}, 'Starting',
            el('input', { name: 'startDate', type: 'date', value: new Date().toISOString().slice(0, 10) }),
          ),
          el('label', {}, 'At',
            el('input', { name: 'time', type: 'time', value: '09:00' }),
          ),
        ),
        el('button', { type: 'submit' }, 'Add chore'),
      ),
      recurringList(),
    );
  }

  function recurringList() {
    if (!state.recurring || state.recurring.length === 0) return null;
    return el('div', { style: 'margin-top: 18px;' },
      el('h2', { style: 'font-size: 0.95rem;' }, 'Recurring chores'),
      el('div', { class: 'members-list' },
        ...state.recurring.map(t => el('div', { class: 'member-row' },
          el('div', {},
            el('div', { style: 'font-weight: 600;' }, t.title),
            el('div', { class: 'contact' }, recurringSummary(t)),
          ),
          el('div', { style: 'display: flex; gap: 6px; flex-wrap: wrap; align-items: center;' },
            el('span', { class: 'reward', style: 'font-size: 0.9rem;' }, fmtMoney(t.reward_cents)),
            el('button', {
              class: 'secondary tiny',
              onClick: () => { toggleRecurringPaused(t.id); render(); },
            }, t.paused ? 'Resume' : 'Pause'),
            el('button', {
              class: 'danger tiny',
              onClick: () => {
                if (confirm(`Stop recurring chore "${t.title}"? Existing instances stay.`)) {
                  deleteRecurring(t.id);
                  render();
                }
              },
            }, 'Delete'),
          ),
        )),
      ),
    );
  }

  function recurringSummary(t) {
    const freq = t.frequency === 'daily' ? 'Every day' : t.frequency === 'weekly' ? 'Every week' : 'Every month';
    const time = t.time_of_day || '09:00';
    const next = new Date(t.next_due_at);
    const nextStr = next.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' }) + ' ' + time;
    return `${freq} at ${time}${t.paused ? ' · paused' : ` · next: ${nextStr}`}`;
  }

  function kidPanel(me) {
    const stats = earningsFor(me.id);
    return el('div', { class: 'card' },
      el('h2', {}, 'Your earnings'),
      el('div', { class: 'chore-meta' }, 'All time earned'),
      el('div', { style: 'font-size: 2.4rem; color: var(--success); font-weight: 800; line-height: 1.1;' }, fmtMoney(stats.total)),
      el('div', { style: 'display: flex; gap: 16px; flex-wrap: wrap; margin-top: 10px;' },
        el('div', {},
          el('div', { class: 'chore-meta' }, 'Owed to you'),
          el('div', { style: 'font-size: 1.1rem; font-weight: 600;' }, fmtMoney(me.balance_cents)),
        ),
        el('div', {},
          el('div', { class: 'chore-meta' }, 'This week'),
          el('div', { style: 'font-size: 1.1rem; font-weight: 600;' }, fmtMoney(stats.week)),
        ),
      ),
      stats.recent.length > 0 ? el('details', { style: 'margin-top: 12px;' },
        el('summary', {}, `Recent payouts (${stats.count})`),
        el('div', { class: 'members-list', style: 'margin-top: 8px;' },
          ...stats.recent.map(c => el('div', { class: 'member-row' },
            el('div', {},
              el('div', {}, c.title),
              el('div', { class: 'contact' }, new Date(c.paid_at).toLocaleDateString()),
            ),
            el('span', { class: 'reward' }, fmtMoney(c.reward_cents)),
          )),
        ),
      ) : null,
      el('p', { class: 'chore-meta' }, 'Pick a chore below, mark it done, and a parent will approve it.'),
      el('form', {
        style: 'margin-top: 10px; display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: end;',
        onSubmit: (e) => {
          e.preventDefault();
          const contact = new FormData(e.target).get('contact');
          updateContact(me.id, (contact || '').toString());
          render();
        }
      },
        el('label', {}, 'Apple Cash contact (iCloud email or phone)',
          el('input', { name: 'contact', type: 'text', placeholder: 'you@icloud.com', value: me.contact || '' })
        ),
        el('button', { type: 'submit', class: 'secondary tiny' }, 'Save'),
      ),
    );
  }

  function familyPanel(isParent) {
    return el('div', { class: 'card' },
      el('h2', {}, isParent ? 'Manage family' : 'Family'),
      el('div', { class: 'members-list' },
        ...state.profiles.map(p => isParent ? parentMemberRow(p) : memberRow(p)),
      ),
      isParent ? el('details', { style: 'margin-top: 14px;' },
        el('summary', {}, '+ Add another profile'),
        addProfileForm(),
      ) : null,
    );
  }

  function memberRow(p) {
    const stats = p.role === 'kid' ? earningsFor(p.id) : null;
    return el('div', { class: 'member-row' },
      el('div', {},
        el('div', {}, `${p.name} `, el('span', { class: `role-badge ${p.role}` }, p.role)),
        p.contact ? el('div', { class: 'contact' }, p.contact) : null,
      ),
      stats ? el('div', { style: 'text-align: right;' },
        el('div', { class: 'chore-meta' }, 'All time'),
        el('div', { style: 'font-size: 1.2rem; color: var(--success); font-weight: 700; line-height: 1;' }, fmtMoney(stats.total)),
      ) : el('span', {}),
    );
  }

  function parentMemberRow(p) {
    const stats = p.role === 'kid' ? earningsFor(p.id) : null;
    return el('div', { class: 'member-row', style: 'flex-direction: column; align-items: stretch;' },
      el('div', { style: 'display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; width: 100%;' },
        el('div', {},
          el('span', { style: 'font-weight: 600;' }, p.name),
          ' ',
          el('span', { class: `role-badge ${p.role}` }, p.role),
          p.pin ? el('span', { class: 'contact', style: 'margin-left: 6px;' }, '🔒 PIN') : null,
          p.contact ? el('div', { class: 'contact' }, p.contact) : null,
          stats ? el('div', { class: 'contact', style: 'margin-top: 2px;' },
            `Owed ${fmtMoney(p.balance_cents)} · this week ${fmtMoney(stats.week)}`
          ) : null,
        ),
        stats ? el('div', { style: 'text-align: right;' },
          el('div', { class: 'chore-meta' }, 'All time'),
          el('div', { style: 'font-size: 1.4rem; color: var(--success); font-weight: 800; line-height: 1;' }, fmtMoney(stats.total)),
        ) : el('span', {}),
      ),
      el('details', { style: 'margin-top: 6px; width: 100%;' },
        el('summary', {}, 'Edit'),
        el('form', {
          style: 'margin-top: 8px;',
          onSubmit: (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            updateProfile(p.id, {
              name: (fd.get('name') || '').toString(),
              contact: (fd.get('contact') || '').toString(),
              role: fd.get('role'),
              pin: (fd.get('pin') || '').toString(),
            });
            render();
          }
        },
          el('label', {}, 'Name', el('input', { name: 'name', value: p.name, required: true })),
          el('label', {}, 'Role',
            el('select', { name: 'role' },
              el('option', { value: 'parent', selected: p.role === 'parent' }, 'Parent'),
              el('option', { value: 'kid', selected: p.role === 'kid' }, 'Kid'),
            ),
          ),
          el('label', {}, 'Apple Cash contact (iCloud email or phone)',
            el('input', { name: 'contact', value: p.contact || '', placeholder: 'kid@icloud.com' }),
          ),
          el('label', {}, p.pin ? 'PIN (clear to remove)' : 'PIN (optional, locks this profile)',
            el('input', { name: 'pin', type: 'text', inputmode: 'numeric', pattern: '[0-9]*', maxlength: '8', value: p.pin || '', placeholder: '4-digit code' }),
          ),
          el('div', { style: 'display: flex; gap: 8px; flex-wrap: wrap;' },
            el('button', { type: 'submit', class: 'tiny' }, 'Save'),
            p.role === 'kid' && p.balance_cents > 0 ? el('button', {
              type: 'button', class: 'success tiny',
              onClick: () => {
                if (confirm(`Mark ${fmtMoney(p.balance_cents)} as paid out to ${p.name}? This zeros their balance.`)) {
                  resetBalance(p.id);
                  render();
                }
              }
            }, `Mark ${fmtMoney(p.balance_cents)} paid`) : null,
            el('button', {
              type: 'button', class: 'danger tiny',
              onClick: () => {
                if (confirm(`Remove ${p.name}? Their unfinished chores will go back to the pool.`)) {
                  removeProfile(p.id);
                  render();
                }
              }
            }, 'Remove'),
          ),
        ),
      ),
    );
  }

  function choreListPanel(isParent, me) {
    const active = state.chores.filter(c => c.status !== 'paid');
    const sorted = [...active].sort((a, b) => {
      const order = { open: 0, claimed: 1, completed: 2, approved: 3 };
      if (order[a.status] !== order[b.status]) return order[a.status] - order[b.status];
      return (b.created_at || '').localeCompare(a.created_at || '');
    });
    return el('div', { class: 'card' },
      el('h2', {}, 'Chores'),
      sorted.length === 0
        ? el('p', { class: 'empty' }, isParent ? 'No chores yet — add one above.' : 'Nothing here yet. Check back soon!')
        : el('div', { class: 'chore-list' }, ...sorted.map(c => choreItem(c, isParent, me))),
    );
  }

  function choreItem(chore, isParent, me) {
    const creator = profileById(chore.created_by);
    const claimer = profileById(chore.claimed_by);
    const isMine = chore.claimed_by === me.id;
    return el('div', { class: 'chore' },
      el('div', { class: 'chore-head' },
        el('div', {},
          el('h3', { class: 'chore-title' }, chore.title),
          chore.description ? el('p', { class: 'chore-desc' }, chore.description) : null,
        ),
        el('div', { style: 'text-align: right' },
          el('div', { class: 'reward' }, fmtMoney(chore.reward_cents)),
          el('div', { class: `status ${chore.status}`, style: 'margin-top: 4px' }, chore.status),
        ),
      ),
      el('div', { class: 'chore-meta' }, choreMeta(creator, claimer)),
      el('div', { class: 'chore-actions' }, ...choreActions(chore, isParent, isMine, claimer)),
    );
  }

  function choreMeta(creator, claimer) {
    const parts = [`Added by ${creator ? creator.name : 'someone'}`];
    if (claimer) parts.push(`claimed by ${claimer.name}`);
    return parts.join(' · ');
  }

  function choreActions(chore, isParent, isMine, claimer) {
    const actions = [];
    if (isParent) {
      if (chore.status === 'completed') {
        actions.push(el('button', { class: 'success tiny', onClick: () => { approveChore(chore.id); render(); } }, 'Approve & pay'));
        actions.push(el('button', { class: 'warn tiny', onClick: () => { rejectChore(chore.id); render(); } }, 'Send back'));
      }
      if (chore.status === 'approved') {
        if (claimer && claimer.contact) {
          actions.push(el('a', {
            class: 'btn-link imessage tiny',
            href: paymentSmsUrl(claimer.contact, chore.reward_cents, chore.title),
          }, `💬 Pay ${fmtMoney(chore.reward_cents)}`));
        }
        actions.push(el('button', {
          class: 'success tiny',
          onClick: () => {
            if (confirm(`Mark "${chore.title}" as paid? This removes the chore and subtracts ${fmtMoney(chore.reward_cents)} from ${claimer ? claimer.name + "'s" : 'the'} balance.`)) {
              markChorePaid(chore.id);
              render();
            }
          }
        }, 'Paid'));
      } else {
        actions.push(el('button', {
          class: 'danger tiny',
          onClick: () => {
            if (confirm(`Delete chore "${chore.title}"?`)) { deleteChore(chore.id); render(); }
          }
        }, 'Delete'));
      }
    } else {
      if (chore.status === 'open') {
        actions.push(el('button', { class: 'tiny', onClick: () => { claimChore(chore.id); render(); } }, 'Pick this chore'));
      }
      if (chore.status === 'claimed' && isMine) {
        actions.push(el('button', { class: 'success tiny', onClick: () => { completeChore(chore.id); render(); } }, 'Mark done'));
        actions.push(el('button', { class: 'secondary tiny', onClick: () => { unclaimChore(chore.id); render(); } }, 'Give up'));
      }
    }
    return actions;
  }

  // --- Render ---

  function render() {
    maybeSpawnRecurring();
    root.innerHTML = '';
    if (firebaseReady && !familyCode) {
      root.appendChild(familySetupView());
      return;
    }
    root.appendChild(activeProfile() ? appView() : profilePicker());
  }

  initFirebase();
  render();

  // Re-check for due recurring chores every minute while the page is open
  setInterval(() => {
    if (maybeSpawnRecurring()) render();
  }, 60 * 1000);
})();
</script>
</body>
</html>
